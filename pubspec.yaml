name: uttarakhand_music_app
description: Uttrakhandi Music — Folk music from Uttarakhand

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  rxdart: ^0.27.7
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/bg_mountains.jpg
    - assets/images/genre_folk.jpg
    - assets/images/genre_devotional.jpg
    - assets/images/genre_wedding.jpg
    - assets/images/genre_festival.jpg
    - assets/images/genre_dance.jpg
    - assets/images/genre_romantic.jpg
